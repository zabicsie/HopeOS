<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HopeOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Desktop -->
<div id="desktop" class="desktop"></div>

<!-- Dock -->
<div id="dock" class="dock"></div>

<!-- Recycle Bin -->
<div id="recycleBin" class="dock-fixed">
    <div class="app">
        <img src="assets/recycle.png">
        <span class="label">Recycle</span>
    </div>
</div>

<!-- Folder Window -->
<div id="folderWindow" class="folder-window hidden">
    <div class="folder-content" id="folderContent"></div>
</div>

<!-- Context Menu -->
<div id="contextMenu" class="context-menu"></div>

<script src="script.js"></script>
</body>
</html>
